<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <!-- LINEのLIFF SDKを読み込み -->
  <script src="https://line-scdn.net"></script>
  <script>
    // ステップ2でコピーした「GASのウェブアプリURL」に書き換えてください
    const gasWebappUrl = "https://docs.google.com/forms/d/e/1FAIpQLSc-K4xOeaRjr_iHM_fTkyqntj9ykr8SwH4vY78r7uwKshDGrQ/viewform?usp=pp_url&entry.1221923024=";
    async function main() {
      // LIFFの初期化
      await liff.init({ liffId: "2010532295-PdIow6DJ" }); 
      
      if (!liff.isLoggedIn()) {
        liff.login(); // ログインしていない場合はログイン画面へ
        document.body.innerText = "ログインしてない: "
      } else {
        // ログイン成功後、プロファイルからLINEの内部ユーザーIDを取得
        const profile = await liff.getProfile();
        const userId = profile.userId;
        document.body.innerText = "userId取得成功: " + userId;  // ← 一旦ここで止めて確認
        // GASへLINE IDをパラメータとして渡してリダイレクト
        //window.location.href = gasWebappUrl + userId;
      } catch (e) {
    document.body.innerText = "エラー: " + e.message;  // ← 失敗理由が画面に出る
      }
    }
    main();
  </script>
</head>
<body>
  <p>ログイン認証中...</p>
</body>
</html>
