<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>アンケート</title>
</head>
<body>
  <p id="status">読み込み中...</p>

  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <script>
    const gasWebappUrl = "https://docs.google.com/forms/d/e/1FAIpQLSc-K4xOeaRjr_iHM_fTkyqntj9ykr8SwH4vY78r7uwKshDGrQ/viewform?usp=pp_url&entry.1221923024=";
    const set = (m) => { document.getElementById("status").innerText = m; };

    async function main() {
      try {
        await liff.init({ liffId: "2010532295-PdIow6DJ" });
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          const p = await liff.getProfile();
          // ★ userIdをフォームのプレフィルURLに付けて遷移
          window.location.href = gasWebappUrl + encodeURIComponent(p.userId);
        }
      } catch (e) {
        set("エラー: " + e.message);
      }
    }
    main();
  </script>
</body>
</html>
