<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <script>
    const gasWebappUrl = "https://docs.google.com/forms/d/e/1FAIpQLSc-K4xOeaRjr_iHM_fTkyqntj9ykr8SwH4vY78r7uwKshDGrQ/viewform?usp=pp_url&entry.1221923024=";

    async function main() {
      try {
        await liff.init({ liffId: "2010532295-PdIow6DJ" });

        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          const profile = await liff.getProfile();
          const userId = profile.userId;
          document.body.innerText = "userId取得成功: " + userId;  // ← 一旦ここで確認
          // 確認できたら下2行を有効化してリダイレクト
          // window.location.href = gasWebappUrl + encodeURIComponent(userId);
        }
      } catch (e) {
        document.body.innerText = "エラー: " + e.message;
      }
    }
    main();
  </script>
</head>
<body>
  <p>ログイン認証中です...</p>
</body>
</html>
